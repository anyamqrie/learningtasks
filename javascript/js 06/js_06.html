<!DOCTYPE html>
<html>
      <head>
             <title>..: Javascript 06 :..</title>
           <style type="text/css">
              .image-container {
                  display: none;
              }
             </style>
              <script>
                function setVisibility(id, value){
                   document.getElementById(id).style.display = value;
                }
            </script>
     </head>
    <body>
       <div class="image-container" id="meow">
          <img src="meow.jpg" width="30%" />
       </div>
       [ <a href="javascript:void(0)" onclick="return setVisibility('meow', 'block')">Display Image</a> |
          <a href="javascript:void(0)" onclick="return setVisibility('meow', 'none')">Hide Image</a>
         ]
         <div class="image-container" id="cat">
           <img src="cat.jpg" width="30%" />
         </div>
         [ <a href="javascript:void(0)" onclick="return setVisibility('cat', 'block')">Display Image</a> |
          <a href="javascript:void(0)" onclick="return setVisibility('cat', 'none')">Hide Image</a>
         ]
    </body>
</html>
